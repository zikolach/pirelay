display_information:
  name: PiRelay Live Driver
  description: Disposable Slack app used by the PiRelay live-test harness to post prompts and read test-channel history.
  background_color: "#7c3aed"
features:
  bot_user:
    display_name: PiRelay Live Driver
    always_online: false
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - chat:write
      - groups:history
      - groups:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
