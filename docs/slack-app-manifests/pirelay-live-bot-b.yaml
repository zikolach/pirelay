display_information:
  name: PiRelay Live Bot B
  description: Disposable PiRelay Slack live-test machine bot B.
  background_color: "#2563eb"
features:
  bot_user:
    display_name: PiRelay Live B
    always_online: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - files:read
      - groups:history
      - groups:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
